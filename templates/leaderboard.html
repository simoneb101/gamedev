<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChibiRun Global Leaderboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <main class="app-shell leaderboard-page">
    <h1>Global Leaderboard</h1>
    <p class="subtitle">Best score per player (most recent tie-break)</p>

    <section class="leaderboard-page-panel">
      <div class="leaderboard-page-head">
        <button id="back-main-menu-btn" type="button">Back To Main Menu</button>
        <button id="refresh-leaderboard-btn" type="button">Refresh</button>
      </div>
      <p id="leaderboard-status" class="score-status">Loading leaderboard...</p>
      <ol id="leaderboard-list" class="leaderboard-list"></ol>
    </section>
  </main>

  <script>
    (() => {
      const list = document.getElementById("leaderboard-list");
      const status = document.getElementById("leaderboard-status");
      const refreshBtn = document.getElementById("refresh-leaderboard-btn");
      const backBtn = document.getElementById("back-main-menu-btn");

      function setStatus(message, isError = false) {
        status.textContent = message;
        status.style.color = isError ? "#8b1e3f" : "#27324a";
      }

      function render(entries) {
        list.innerHTML = "";
        if (!entries.length) {
          const item = document.createElement("li");
          item.textContent = "No scores posted yet.";
          list.appendChild(item);
          return;
        }

        entries.forEach((entry) => {
          const item = document.createElement("li");
          const character = entry.character ? ` (${entry.character})` : "";
          const when = entry.created_at ? ` - ${new Date(entry.created_at).toLocaleString()}` : "";
          item.textContent = `${entry.player}${character}: ${entry.score}${when}`;
          list.appendChild(item);
        });
      }

      async function loadLeaderboard() {
        setStatus("Loading leaderboard...");
        try {
          const res = await fetch("/api/leaderboard?limit=50", { cache: "no-store" });
          const payload = await res.json();
          if (!res.ok) {
            throw new Error(payload.error || "Failed to load leaderboard");
          }
          render(payload.entries || []);
          setStatus("Showing best score per player.");
        } catch (err) {
          setStatus(`Could not load leaderboard: ${err.message}`, true);
        }
      }

      refreshBtn.addEventListener("click", loadLeaderboard);
      backBtn.addEventListener("click", () => {
        window.location.href = "/";
      });

      loadLeaderboard();
    })();
  </script>
</body>
</html>
